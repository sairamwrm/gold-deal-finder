name: Gold Deal Scanner

on:
  schedule:
    - cron: "*/6 * * * *"   # every 6 minutes (UTC)
  # workflow_dispatch removed (no manual option)

permissions:
  contents: read

concurrency:
  group: gold-deal-scanner
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore scanner state (dedup + last-known reference)
        uses: actions/cache@v4
        with:
          path: .scanner_state.json
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          GOODRETURNS_CITY: "hyderabad"

          PAYMENT_MODES_ALLOWED: ""     # allow all (avoid filtering everything out)
          MIN_WEIGHT: "0.3"
          MIN_DISCOUNT_PERCENTAGE: "0"

          FORCE_SCAN: "false"
          TEST_RUN: "false"
        run: |
          echo "Triggered by: ${{ github.event_name }} Ref: ${{ github.ref }}"
          python scanner.py

      - name: Upload summary + state
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            scan_summary.json
            .scanner_state.json
