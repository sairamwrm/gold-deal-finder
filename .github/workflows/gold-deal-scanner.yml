name: Gold Deal Scanner

on:
  # ✅ scheduled trigger (GitHub minimum is 5 minutes)
  schedule:
    - cron: "*/5 * * * *"

  # ✅ TEMPORARY: push trigger to prove the workflow is active on main
  # Remove this block after you see at least 1 scheduled run working.
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: gold-deal-scanner
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger (must say schedule for scheduled runs)
        run: echo "Triggered by: ${{ github.event_name }} Ref: ${{ github.ref }}"

      - name: Ensure workflow is enabled warning check
        run: echo "If scheduled workflows were disabled (fork/inactivity), re-enable in Actions UI."

      - name: Restore scanner state
        uses: actions/cache@v4
        with:
          path: .scanner_state.json
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOODRETURNS_CITY: "hyderabad"
          PAYMENT_MODES_ALLOWED: ""
          MIN_WEIGHT: "0.3"
          MIN_DISCOUNT_PERCENTAGE: "0"
          FORCE_SCAN: "false"
          TEST_RUN: "false"
        run: python scanner.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            scan_summary.json
            .scanner_state.json
